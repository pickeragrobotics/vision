bag_yolo_detector:
  ros__parameters:
    bag_path: "../data/real_sense_bags/20260312_100746.bag"
    bag_reader_backend: "auto"
    bag_storage_id: "sqlite3"
    color_topic: "/camera/color/image_raw"
    depth_topic: "/camera/aligned_depth_to_color/image_raw"
    camera_info_topic: "/camera/color/camera_info"
    flip_image: true
    detection_topic: "/detections"
    detection_3d_topic: "/detections_3d"
    debug_mode: false
    debug_image_topic: "/debug/detections_image"
    confidence_threshold: 0.25
    min_volume_m: 0.000008
    max_volume_m: 0.001
    sync_tolerance_sec: 0.03
    depth_scale_meters: 0.001
    yolo_weights_path: ""
    yolo_device: ""
    processing_period_sec: 0.001
    log_every_n_frames: 30
